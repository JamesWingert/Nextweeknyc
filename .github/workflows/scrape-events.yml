name: Scrape Weekly Events

on:
  schedule:
    # Every Sunday at 6am UTC (1am EST) — gives you data for the upcoming week
    - cron: '0 6 * * 0'
  workflow_dispatch: # manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      # -------------------------------------------------------
      # TODO: Replace these with your actual scraper commands.
      # Each scraper should output a JSON file (array of events).
      # The validate step below will normalize the schema.
      # -------------------------------------------------------
      - name: Run events scraper
        id: scrape-events
        run: |
          # Example: node scripts/scrape-events.js > /tmp/raw-events.json
          echo "Replace this with your scraper command"
          # For now, skip if no scraper exists
          if [ -f scripts/scrape-events.js ]; then
            node scripts/scrape-events.js > /tmp/raw-events.json
          else
            echo "No scraper found, skipping events.json"
            cp public/data/events.json /tmp/raw-events.json
          fi

      - name: Run film/museum scraper
        id: scrape-film
        run: |
          if [ -f scripts/scrape-film-museum.js ]; then
            node scripts/scrape-film-museum.js > /tmp/raw-film.json
          else
            echo "No scraper found, skipping film_museum_events.json"
            cp public/data/film_museum_events.json /tmp/raw-film.json
          fi

      - name: Validate and normalize events
        run: |
          node scripts/validate-events.js /tmp/raw-events.json public/data/events.json
          node scripts/validate-events.js /tmp/raw-film.json public/data/film_museum_events.json

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update weekly event data [skip ci]"
            git push
          fi
