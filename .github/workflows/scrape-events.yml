name: Scrape Events (Mon/Thu)

on:
  schedule:
    # Monday and Thursday at 6am UTC (1am EST)
    - cron: '0 6 * * 1,4'
  workflow_dispatch: # manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Install xvfb for headed browser mode
        run: sudo apt-get install -y xvfb

      - name: Run general events scraper (8 sources)
        run: |
          xvfb-run --auto-servernum node scripts/scrape-general-events.js > /tmp/raw-events-full.txt 2>/tmp/scrape-general.log || true
          # Extract only the JSON array — Playwright/xvfb may print non-JSON to stdout
          sed -n '/^\[/,/^\]/p' /tmp/raw-events-full.txt > /tmp/raw-events.json

      - name: Run film/arts scraper (24 sources)
        run: |
          xvfb-run --auto-servernum node scripts/scrape-film-arts.js > /tmp/raw-film-full.txt 2>/tmp/scrape-film.log || true
          # Extract only the JSON array — Playwright/xvfb may print non-JSON to stdout
          sed -n '/^\[/,/^\]/p' /tmp/raw-film-full.txt > /tmp/raw-film.json

      - name: Show scraper logs
        if: always()
        run: |
          echo "=== General Events Log ==="
          cat /tmp/scrape-general.log || true
          echo ""
          echo "=== Film/Arts Log ==="
          cat /tmp/scrape-film.log || true
          echo ""
          echo "=== Raw stdout (first 5 lines, general) ==="
          head -5 /tmp/raw-events-full.txt 2>/dev/null || echo "(no file)"
          echo ""
          echo "=== Raw stdout (first 5 lines, film) ==="
          head -5 /tmp/raw-film-full.txt 2>/dev/null || echo "(no file)"

      - name: Validate and normalize general events
        run: |
          if [ -s /tmp/raw-events.json ]; then
            node scripts/validate-events.js /tmp/raw-events.json public/data/events.json
          else
            echo "General scraper produced no output, keeping existing data"
          fi

      - name: Validate and normalize film/arts events
        run: |
          if [ -s /tmp/raw-film.json ]; then
            node scripts/validate-events.js /tmp/raw-film.json public/data/film_museum_events.json
          else
            echo "Film/arts scraper produced no output, keeping existing data"
          fi

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update event data [skip ci]"
            git push
          fi

      - name: Notify on failure
        if: failure()
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_USER_ID }}" \
            -d "text=❌ Weekly events scraper failed! Check https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
