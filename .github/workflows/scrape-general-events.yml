name: Scrape NYC General Events

on:
  schedule:
    # Every Sunday at 7pm EST (12am UTC Monday)
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-general:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Scrape General Events
        id: scrape
        run: |
          node scripts/scrape-general-events.js > /tmp/raw-general-full.txt 2>/tmp/scrape-general.log || true
          sed -n '/^\[/,/^\]/p' /tmp/raw-general-full.txt > /tmp/raw-general.json
        env:
          NODE_ENV: production
          PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
          PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
          PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}

      - name: Show scraper log
        if: always()
        run: |
          echo "=== Full Scraper Log ==="
          cat /tmp/scrape-general.log 2>/dev/null || true
          echo ""
          echo "=== SOURCE SUMMARY ==="
          grep -E '(Source|---|✓|⚠|⛔|📅|ERROR|ZERO|REPORT|Total|Date range)' /tmp/scrape-general.log 2>/dev/null || echo "(no report found)"

      - name: Write job summary
        if: always()
        run: |
          echo "## General Events Scrape Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E '(Source|---|✓|⚠|⛔|📅|ERROR|ZERO|REPORT|Total|Date range)' /tmp/scrape-general.log 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "(no report)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Validate and normalize
        run: |
          node scripts/validate-events.js /tmp/raw-general.json /tmp/validated-general.json 2>&1 | tee /tmp/validate-general.log
          COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('/tmp/validated-general.json','utf8')).length)")
          echo "General events validated: $COUNT"
          if [ "$COUNT" -ge 50 ]; then
            cp /tmp/validated-general.json public/data/events.json
          else
            echo "⚠ Only $COUNT events (min 50) — keeping existing data to avoid overwriting with bad scrape"
          fi

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/events.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update general events [skip ci]"
            git push
          fi

      - name: Notify on failure
        if: failure()
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_USER_ID }}" \
            -d "text=❌ General events scraper failed! Check https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
