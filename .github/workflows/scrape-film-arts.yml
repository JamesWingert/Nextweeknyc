name: Scrape NYC Film & Arts Events

on:
  schedule:
    # Every Sunday at 6pm EST (11pm UTC) - Film/Arts events
    - cron: '0 23 * * 0'
  workflow_dispatch:

jobs:
  scrape-film-arts:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install chromium

      - name: Scrape Film/Arts Events
        run: node scripts/scrape-film-arts.js > /tmp/raw-film-arts.json
        env:
          NODE_ENV: production

      - name: Validate and normalize
        run: node scripts/validate-events.js /tmp/raw-film-arts.json public/data/film_museum_events.json

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/film_museum_events.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update film/arts events [skip ci]"
            git push
          fi
