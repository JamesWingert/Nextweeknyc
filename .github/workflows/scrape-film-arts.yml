name: Scrape NYC Film & Arts Events

on:
  schedule:
    # Every Sunday at 6pm EST (11pm UTC)
    - cron: '0 23 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-film-arts:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Install xvfb for headed browser mode
        run: sudo apt-get install -y xvfb

      - name: Scrape Film/Arts Events
        id: scrape
        run: |
          xvfb-run --auto-servernum node scripts/scrape-film-arts.js > /tmp/raw-film-full.txt 2>/tmp/scrape-film.log || true
          sed -n '/^\[/,/^\]/p' /tmp/raw-film-full.txt > /tmp/raw-film-arts.json
        env:
          NODE_ENV: production

      - name: Show scraper log
        if: always()
        run: |
          echo "=== Full Scraper Log ==="
          cat /tmp/scrape-film.log 2>/dev/null || true
          echo ""
          echo "=== SOURCE SUMMARY ==="
          grep -E '(Source|---|✓|⚠|⛔|📅|ERROR|ZERO|REPORT|Total|Date range)' /tmp/scrape-film.log 2>/dev/null || echo "(no report found)"

      - name: Write job summary
        if: always()
        run: |
          echo "## Film/Arts Scrape Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E '(Source|---|✓|⚠|⛔|📅|ERROR|ZERO|REPORT|Total|Date range)' /tmp/scrape-film.log 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "(no report)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Validate and normalize
        run: |
          node scripts/validate-events.js /tmp/raw-film-arts.json /tmp/validated-film-arts.json
          COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('/tmp/validated-film-arts.json','utf8')).length)")
          echo "Film/arts events validated: $COUNT"
          if [ "$COUNT" -ge 50 ]; then
            cp /tmp/validated-film-arts.json public/data/film_museum_events.json
          else
            echo "⚠ Only $COUNT events (min 50) — keeping existing data to avoid overwriting with bad scrape"
          fi

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/film_museum_events.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update film/arts events [skip ci]"
            git push
          fi

      - name: Notify on failure
        if: failure()
        run: |
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_USER_ID }}" \
            -d "text=❌ Film/Arts scraper failed! Check https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
